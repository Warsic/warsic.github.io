<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>一亩花田</title>
<style>
  /*
   * 基准单位 U = 100vw / 15（一个格子宽）
   * 所有布局尺寸均以 U 的倍数表达，无硬编码 px 尺寸
   * 仅保留装饰性 border-width (1-4px) 及 translate(1px,1px) 微交互
   */

  @font-face {
    font-family: 'Zpix';
    src: url('zpix.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  body {
    background-color: rgb(187, 183, 92);
    font-family: 'Zpix', 'Courier New', monospace;
    overflow-x: hidden;
    touch-action: manipulation;
    image-rendering: pixelated;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-bottom: calc(100vw / 20);
  }

  /* ── 右上角图标（无背景） ── */
  /* icon = 1.5U = calc(100vw/10)；间距 = icon/2 = calc(100vw/20) */
  .header-btns {
    position: absolute;
    right: calc(100vw / 20);
    top: calc(100vw / 20);
    display: flex;
    gap: calc(100vw / 20);
    align-items: center;
    z-index: 50;
  }

  #backBtn {
    position: fixed;
    left: calc(100vw / 20);
    top: calc(100vw / 20);
    width: calc(100vw / 10);
    height: calc(100vw / 10);
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    z-index: 50;
  }
  #backBtn img {
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
  }

  .icon-btn {
    width: calc(100vw / 10);
    height: calc(100vw / 10);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
  }

  .icon-btn img {
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
  }

  /* ── 格子区（宽 = 13U = 13/15·vw） ── */
  .grid-area {
    width: calc(100vw * 13 / 15);
    display: flex;
    flex-direction: column;
  }

  .title-img {
    width: 100%;
    height: auto;
    display: block;
    image-rendering: pixelated;
  }

  /* ── 加载屏 ── */
  #loadingScreen {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: rgb(187, 183, 92);
  }

  #loadingGif {
    position: fixed;
    z-index: 10000;
    width: calc(100vw / 3);
    height: auto;
    image-rendering: pixelated;
    left: 50%;
    top: 40%;
    transform: translate(-50%, -50%);
  }

  /* 进度条高度 = U/8 = 100vw/120 */
  .progress-bar-container {
    width: 100%;
    height: calc(100vw / 120);
    background: rgb(106, 132, 77);
    position: relative;
    overflow: visible;
  }

  .progress-bar-played {
    height: 100%;
    width: 0%;
    background: rgb(154, 163, 86);
    position: relative;
  }

  #snailWrap {
    position: absolute;
    right: 0;
    bottom: 100%;
    transform: translateX(50%);
    opacity: 0;
    transition: opacity 0.4s;
    cursor: ew-resize;
    touch-action: none;
  }

  #snailWrap img {
    display: block;
    height: calc(100vw / 12);
    width: auto;
    image-rendering: pixelated;
  }

  .grid-wrap {
    width: 100%;
  }

  /* 分割线 = U/16；精确解：gap = grid_w/220 = 13/15/220·vw = 13/3300·vw */
  .grid-container {
    width: 100%;
    aspect-ratio: 1 / 1;
    display: grid;
    grid-template-columns: repeat(13, 1fr);
    grid-template-rows: repeat(13, 1fr);
    background: rgb(229, 225, 193);
    gap: calc(100vw * 13 / 3300);
  }

  .cell {
    background: rgb(242, 237, 204);
    position: relative;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* 选中描边向外扩展入分割线区，宽度 = gap */
  .cell.selected {
    outline: calc(100vw * 13 / 3300) solid rgb(187, 183, 92);
    z-index: 2;
  }

  .cell .play-icon,
  .cell .pause-icon {
    display: none;
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    image-rendering: pixelated;
  }

  .cell.show-play .play-icon { display: block; }
  .cell.show-pause .pause-icon { display: block; }

  /* ── 曲名（格子外侧下方）── */
  /* 固定高度保证工具栏位置不随曲名显隐变化；字体高度 = U/2 = 100vw/30 */
  .song-name-bar {
    width: 100%;
    height: calc(100vw / 22);
    display: flex;
    align-items: center;
    gap: calc(100vw / 90);
    font-size: calc(100vw / 30);
    color: rgb(127, 108, 76);
    overflow: hidden;
  }

  .song-name-bar .tone-icon {
    height: 1em;
    width: auto;
    flex-shrink: 0;
    image-rendering: pixelated;
  }

  .song-name-bar .song-text {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .song-name-bar .playing-icon {
    height: 1em;
    width: auto;
    flex-shrink: 0;
    image-rendering: pixelated;
  }

  /* ── 工具栏（等宽格子区：4btn + 3gap = 13U）── */
  /* btn = 23U/120；gap = U/2 = 100vw/30 */
  .toolbar {
    display: flex;
    gap: calc(100vw / 30);
    margin-top: calc(100vw / 20);
    width: calc(100vw * 13 / 15);
  }

  .tool-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
  }

  .tool-btn {
    width: 100%;
    aspect-ratio: 1 / 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    image-rendering: pixelated;
    position: relative;
    overflow: hidden;
    border: none;
    background: none;
  }

  .tool-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url('img/btnbg.png') center / cover no-repeat;
    opacity: 0.25;
    z-index: 0;
    image-rendering: pixelated;
  }

  .tool-btn.active::before {
    opacity: 1;
  }

  .tool-btn img {
    width: 60%;
    height: 60%;
    image-rendering: pixelated;
    position: relative;
    z-index: 1;
  }


  /* ── 弹窗 ── */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding-bottom: 20%;
  }
  .modal-overlay.show { display: flex; }

  /* ── 弹窗 A ── */
  .popup {
    --pw: calc(100vw * 19 / 30);
    --cw: calc(100vw / 2);
    background: url('img/popup_bg.png') no-repeat center / 100% 100%;
    image-rendering: pixelated;
    width: var(--pw);
    aspect-ratio: 1;
    box-sizing: border-box;
    padding: calc(var(--pw) / 14) calc(100vw / 15);
    position: relative;
    overflow: visible;
  }

  .popup-input-row {
    display: flex;
    align-items: stretch;
    height: calc(var(--cw) / 7);
    gap: calc(var(--cw) / 26);
    margin-bottom: calc(var(--cw) / 24);
  }

  .song-input-wrap {
    flex: 1;
    background: url('img/song_input.png') no-repeat center / 100% 100%;
    image-rendering: pixelated;
    display: flex;
    align-items: center;
  }

  #inputSongName {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Zpix', monospace;
    font-size: calc(var(--cw) / 13);
    color: #4E4B28;
    padding: calc(var(--cw) / 50) calc(var(--cw) / 28);
    box-sizing: border-box;
    user-select: text;
    -webkit-user-select: text;
  }

  .file-icon-btn {
    position: relative;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    flex-shrink: 0;
    aspect-ratio: 2048 / 1940;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .file-icon-btn > img {
    width: 100%;
    height: auto;
    image-rendering: pixelated;
  }

  .file-icon-btn input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    font-size: 0;
  }

  .tag-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: calc(var(--cw) / 55);
    margin-bottom: calc(var(--cw) / 18);
  }

  .tag-btn, .tag-add-btn {
    background: url('img/tag.png') no-repeat center / 100% 100%;
    border: none;
    cursor: pointer;
    font-family: 'Zpix', monospace;
    font-size: calc(var(--cw) / 24);
    color: #F0EDD0;
    aspect-ratio: 2048 / 1170;
    image-rendering: pixelated;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    line-height: 1;
    overflow: hidden;
    white-space: nowrap;
  }

  .tag-add-btn {
    background-image: url('img/tag_add.png');
  }

  .tag-input {
    background: url('img/tag.png') no-repeat center / 100% 100%;
    border: none;
    outline: none;
    font-family: 'Zpix', monospace;
    font-size: calc(var(--cw) / 24);
    color: #6A6840;
    aspect-ratio: 2048 / 1170;
    image-rendering: pixelated;
    text-align: center;
    padding: 0;
    width: 100%;
    box-sizing: border-box;
  }

  .color-swatch-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: calc(var(--pw) / 55);
  }

  .color-label-img {
    width: calc(100vw * 2 / 15);
    height: auto;
    image-rendering: pixelated;
  }

  .color-swatch {
    width: calc(100vw * 14 / 75);
    aspect-ratio: 1;
    cursor: pointer;
    -webkit-mask-image: url('img/impression_color.png');
    mask-image: url('img/impression_color.png');
    -webkit-mask-size: 100% 100%;
    mask-size: 100% 100%;
  }

  .confirm-btn {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    transform: translateY(50%);
    text-align: center;
    pointer-events: none;
  }

  .confirm-btn.show { pointer-events: auto; }

  .confirm-btn img {
    width: calc(100vw * 7 / 30);
    height: auto;
    image-rendering: pixelated;
    cursor: pointer;
    display: block;
    margin: 0 auto;
    filter: grayscale(1);
  }

  .confirm-btn.show img { filter: none; }

  .confirm-btn.show:active img { transform: translate(1px, 1px); }
  /* ── HSV 调色盘 ── */
  .hsv-section {
    display: flex;
    flex-direction: column;
    gap: calc(var(--cw) / 20);
    margin-bottom: calc(var(--cw) / 20);
  }

  .hsv-row {
    display: flex;
    align-items: center;
    gap: calc(var(--cw) / 26);
  }

  .hsv-label, .hsv-val {
    width: calc(var(--cw) / 5.5);
    font-family: 'Zpix', monospace;
    font-size: calc(var(--cw) / 19);
    color: #4E4B28;
    flex-shrink: 0;
  }

  .hsv-label { text-align: right; }
  .hsv-val   { text-align: center; }

  .hsv-slider-wrap {
    flex: 1;
    display: flex;
    align-items: center;
  }

  .hsv-slider-wrap input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: calc(var(--cw) / 8);
    background: transparent;
    outline: none;
    border: none;
    cursor: pointer;
    margin: 0;
    padding: 0;
  }

  .hsv-slider-wrap input[type="range"]::-webkit-slider-runnable-track {
    height: calc(var(--cw) / 14);
    background: url('img/chute.png') no-repeat center / 100% 100%;
    image-rendering: pixelated;
    border: none;
  }

  .hsv-slider-wrap input[type="range"]::-moz-range-track {
    height: calc(var(--cw) / 14);
    background: url('img/chute.png') no-repeat center / 100% 100%;
    image-rendering: pixelated;
    border: none;
  }

  .hsv-slider-wrap input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: calc(var(--cw) / 10);
    height: calc(var(--cw) / 8);
    background: url('img/slider.png') no-repeat center / 100% 100%;
    image-rendering: pixelated;
    cursor: pointer;
    margin-top: calc((var(--cw) / 14 - var(--cw) / 8) / 2);
  }

  .hsv-slider-wrap input[type="range"]::-moz-range-thumb {
    width: calc(var(--cw) / 10);
    height: calc(var(--cw) / 8);
    background: url('img/slider.png') no-repeat center / 100% 100%;
    image-rendering: pixelated;
    cursor: pointer;
    border: none;
  }

  .hsv-color-name {
    font-family: 'Zpix', monospace;
    color: #8A8060;
    text-align: center;
  }

  .confirm-color-btn {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    transform: translateY(50%);
    text-align: center;
  }

  .confirm-color-btn img {
    width: calc(100vw * 7 / 30);
    height: auto;
    image-rendering: pixelated;
    cursor: pointer;
    display: block;
    margin: 0 auto;
  }

  .confirm-color-btn:active img { transform: translate(1px, 1px); }

  /* ── popupB 滑块尺寸覆盖：滑槽6格宽，等比缩放 ── */
  #popupB {
    padding-left: calc(100vw / 20);
    padding-right: calc(100vw / 20);
    padding-top: calc(100vw / 15);
    display: flex;
    flex-direction: column;
  }

  #popupB .color-swatch-wrap {
    margin-top: calc(var(--pw) / 25);
  }

  #popupB .hsv-row {
    gap: calc(100vw / 90);
  }

  #popupB .hsv-label {
    width: calc(100vw * 7 / 75);
    font-size: calc(100vw * 7 / 150);
    white-space: nowrap;
    color: #8A8060;
  }

  #popupB .hsv-val {
    width: calc(100vw * 7 / 100);
    font-size: calc(100vw * 7 / 150);
    white-space: nowrap;
    color: #8A8060;
  }

  #popupB .hsv-slider-wrap {
    position: relative;
    height: calc(100vw * 7 / 150);
  }

  #popupB .hsv-slider-wrap::before {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    top: -50%;
    height: calc(100vw * 7 / 100);
    background: url('img/chute.png') no-repeat center / 100% 100%;
    image-rendering: pixelated;
    pointer-events: none;
  }

  #popupB .hsv-slider-wrap input[type="range"] {
    position: relative;
    z-index: 1;
    height: 90%;
    background: transparent;
  }

  #popupB .hsv-slider-wrap input[type="range"]::-webkit-slider-runnable-track {
    background: transparent;
    height: 100%;
    border: none;
  }

  #popupB .hsv-slider-wrap input[type="range"]::-moz-range-track {
    background: transparent;
    height: calc(100vw * 7 / 300);
    border: none;
  }

  #popupB .hsv-slider-wrap input[type="range"]::-webkit-slider-thumb {
    width: calc(100vw * 7 / 150 * 902 / 1136);
    height: calc(100vw * 7 / 150);
    margin-top: 0;
  }

  #popupB .hsv-slider-wrap input[type="range"]::-moz-range-thumb {
    width: calc(100vw * 7 / 150 * 902 / 1136);
    height: calc(100vw * 7 / 150);
  }

  .hsv-color-name {
    font-size: calc(100vw * 7 / 170);
  }

  .cell-confirm-anim {
    position: absolute;
    inset: 0;
    -webkit-mask-size: 100% 100%;
    mask-size: 100% 100%;
    pointer-events: none;
    z-index: 5;
  }

  /* ── 播放列表侧边栏 ── */
  #playlistOverlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 199;
  }
  #playlistOverlay.open { display: block; }

  #playlistPanel {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: calc(100vw * 9 / 15);
    background: rgb(106, 132, 77);
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    z-index: 200;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    /* 底部留1格距离 */
    padding-bottom: calc(100vw / 15);
  }
  #playlistPanel.open { transform: translateX(0); }

  /* 内容左对齐基准 = 左边缘(100vw/30) + 滚动条(100vw/50) + 滚动条与内容间距(100vw/30)
     = 100vw*(5+3+5)/150 = 100vw*13/150 */
  .pl-top {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    padding: calc(100vw / 20) calc(100vw / 30) calc(100vw / 40) calc(100vw / 30);
    gap: calc(100vw / 50);
  }
  .pl-top-left {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: calc(100vw / 6);
  }
  .pl-name {
    color: rgb(187, 183, 92);
    font-size: calc(100vw * 7 / 135);
    font-weight: bold;
    outline: none;
    cursor: text;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pl-bio {
    color: rgb(187, 183, 92);
    font-size: calc(100vw * 7 / 200);
    line-height: 1;
    height: calc(100vw * 7 / 200 * 1 * 3);
    outline: none;
    cursor: text;
    overflow: hidden;
  }
  .pl-cover {
    flex-shrink: 0;
    width: calc(100vw / 6);
    height: calc(100vw / 6);
    cursor: pointer;
    image-rendering: pixelated;
    overflow: hidden;
  }
  .pl-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    image-rendering: pixelated;
    display: block;
  }

  .pl-search-row {
    display: flex;
    align-items: center;
    padding: 0 calc(100vw / 30) calc(100vw / 40) calc(100vw / 30);
    gap: calc(100vw / 50);
  }
  .pl-search-wrap {
    flex: 1;
    position: relative;
  }
  .pl-search-img {
    width: 100%;
    height: auto;
    display: block;
    image-rendering: pixelated;
  }
  .pl-search-input {
    position: absolute;
    top: 0; bottom: 0; left: 0;
    right: calc(100% * 344 / 2048);
    background: transparent;
    border: none;
    outline: none;
    color: rgb(187, 183, 92);
    font-family: 'Zpix', 'Courier New', monospace;
    font-size: calc(100vw * 7 / 200);
    padding: 0 calc(100vw / 60);
    caret-color: rgb(187, 183, 92);
  }
  .pl-search-input::placeholder { color: transparent; }
  .pl-mode-btn {
    flex-shrink: 0;
    width: calc(100vw / 15);
    height: calc(100vw / 15);
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 0;
  }
  .pl-mode-btn img {
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    display: block;
  }

  /* 滚动条左边缘距屏幕左边 100vw/30，
     内容左边缘距滚动条右边 100vw/30 */
  .pl-list-wrap {
    flex: 1;
    min-height: 0;
    overflow-y: scroll;
    direction: rtl;
    margin: 0 calc(100vw / 30) 0 calc(100vw / 30);
  }
  .pl-list-wrap::-webkit-scrollbar { width: calc(100vw / 50); }
  .pl-list-wrap::-webkit-scrollbar-track {
    background: rgb(76, 97, 53);
    margin-top: calc(100vw / 100);
  }
  /* 内容不足以滚动时 thumb 被浏览器隐藏，改 track 色模拟 thumb 填满 */
  .pl-list-wrap.pl-full::-webkit-scrollbar-track { background: rgb(187, 183, 92); }
  .pl-list-wrap::-webkit-scrollbar-thumb { background: rgb(187, 183, 92); }

  /* padding-left = 100vw/30，使花图标与上方内容左对齐 */
  .pl-item {
    direction: ltr;
    display: flex;
    align-items: center;
    padding: calc(100vw / 70) 0 calc(100vw / 70) calc(100vw / 30);
    gap: calc(100vw / 50);
    color: rgb(187, 183, 92);
    font-size: calc(100vw * 7 / 200);
    cursor: pointer;
  }
  .pl-item.pl-playing { color: rgb(242, 237, 204); }

  .pl-flower {
    position: relative;
    width: calc(100vw * 7 / 190);
    height: calc(100vw * 7 / 190);
    flex-shrink: 0;
  }
  .pl-flower::before {
    content: '';
    position: absolute;
    left: 33.33%; top: 33.33%;
    width: 33.34%; height: 33.34%;
    background-color: var(--flower-color, transparent);
  }
  .pl-flower::after {
    content: '';
    position: absolute;
    inset: 0;
    background: url('img/flower_icon.png') no-repeat center / 100% 100%;
    image-rendering: pixelated;
  }
  .pl-song-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .pl-duration { flex-shrink: 0; }

  /* ── 主界面 ── */
  #homeScreen {
    position: fixed;
    inset: 0;
    z-index: 9000;
    overflow: hidden;
    display: none;

<script>
// ============ IndexedDB Storage ============
const DB_NAME = 'FlowerFieldDB';
const DB_VERSION = 1;
const STORE_NAME = 'cells';
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE_NAME)) {
        d.createObjectStore(STORE_NAME);
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e);
  });
}

function dbPut(key, value) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).put(value, key);
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e);
  });
}

function dbGet(key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = (e) => reject(e);
  });
}

function dbDelete(key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).delete(key);
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e);
  });
}

function dbGetAll() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const store = tx.objectStore(STORE_NAME);
    const result = {};
    const req = store.openCursor();
    req.onsuccess = (e) => {
      const cursor = e.target.result;
      if (cursor) {
        result[cursor.key] = cursor.value;
        cursor.continue();
      } else {
        resolve(result);
      }
    };
    req.onerror = (e) => reject(e);
  });
}

function dbClearAll() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).clear();
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e);
  });
}

// ============ DATA ============
const GRID_SIZE = 13;
let cells = [];
let cellData = {};
let currentTool = null;
let selectedCell = null;
let moveSource = null;
let copySource = null;
let currentAudio = null;
let playingCell = null;

let editingCell = null;
let tempColor = null;
let tempAudioBase64 = null;
let tempTags = [];

function keyRC(r, c) { return r + ',' + c; }

// ============ HSV ============
function hsvToRgb(h, s, v) {
  s /= 100; v /= 100;
  const c = v * s;
  const x = c * (1 - Math.abs((h / 60) % 2 - 1));
  const m = v - c;
  let r1, g1, b1;
  if (h < 60) { r1=c; g1=x; b1=0; }
  else if (h < 120) { r1=x; g1=c; b1=0; }
  else if (h < 180) { r1=0; g1=c; b1=x; }
  else if (h < 240) { r1=0; g1=x; b1=c; }
  else if (h < 300) { r1=x; g1=0; b1=c; }
  else { r1=c; g1=0; b1=x; }
  return [Math.round((r1+m)*255), Math.round((g1+m)*255), Math.round((b1+m)*255)];
}

function rgbToHsv(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min;
  let h = 0, s = max === 0 ? 0 : d / max, v = max;
  if (d !== 0) {
    if (max === r) h = 60 * (((g-b)/d) % 6);
    else if (max === g) h = 60 * ((b-r)/d + 2);
    else h = 60 * ((r-g)/d + 4);
  }
  if (h < 0) h += 360;
  return [Math.round(h), Math.round(s*100), Math.round(v*100)];
}

function hsvToHex(h, s, v) {
  const [r, g, b] = hsvToRgb(h, s, v);
  return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
}

function hexToRgb(hex) {
  const m = hex.match(/^#?([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
  if (!m) return [200,200,200];
  return [parseInt(m[1],16), parseInt(m[2],16), parseInt(m[3],16)];
}

// ============ ICONS ============
function createPlaySvg() {
  return `<img src="img/play.png" class="play-icon">`;
}

function createPauseSvg() {
  return `<img src="img/pause.png" class="pause-icon">`;
}

// ============ GRID ============
function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  cells = [];
  for (let r = 0; r < GRID_SIZE; r++) {
    const row = [];
    for (let c = 0; c < GRID_SIZE; c++) {
      const el = document.createElement('div');
      el.className = 'cell';
      el.innerHTML = createPlaySvg() + createPauseSvg();
      el.addEventListener('click', () => onCellClick(r, c));
      grid.appendChild(el);
      row.push(el);
      const d = cellData[keyRC(r, c)];
      if (d && d.color) el.style.background = d.color;
    }
    cells.push(row);
  }
}

// ============ AUDIO ============
let _rafId = null;
let _snailResetTimer = null;
let _snailOutTimer = null;
let _pendingSnailWalk = false;
let _isPaused = false;

// GIF 字节缓存：预加载后存 ArrayBuffer，每次重播创建新 Blob URL 强制从第1帧解码
const _gifBytes = {};
const _blobUrls = {};
function freshGifSrc(key) {
  if (_blobUrls[key]) { URL.revokeObjectURL(_blobUrls[key]); delete _blobUrls[key]; }
  const ab = _gifBytes[key];
  if (!ab) return null;
  const url = URL.createObjectURL(new Blob([ab], {type: 'image/gif'}));
  _blobUrls[key] = url;
  return url;
}

function setProgress(pct) {
  document.getElementById('progressPlayed').style.width = pct + '%';
}

function startProgressAnimation() {
  if (_rafId) cancelAnimationFrame(_rafId);
  function tick() {
    if (!currentAudio || !currentAudio.duration) { _rafId = requestAnimationFrame(tick); return; }
    setProgress((currentAudio.currentTime / currentAudio.duration) * 100);
    _rafId = requestAnimationFrame(tick);
  }
  _rafId = requestAnimationFrame(tick);
}

function stopProgressAnimation() {
  if (_rafId) { cancelAnimationFrame(_rafId); _rafId = null; }
}

// 切换蜗牛动画：wrapper DOM-swap 保证旧帧可见直到新 GIF 第1帧就绪
// 取消待执行的 snail_out→snail.gif 计时器（打断当前过渡）
function setSnailSrc(src) {
  if (_snailOutTimer) { clearTimeout(_snailOutTimer); _snailOutTimer = null; }
  const wrap = document.getElementById('snailWrap');
  if (!wrap) return;
  const url = freshGifSrc(src);
  const newSrc = url !== null ? url : src;
  const oldImg = wrap.querySelector('img');
  const newImg = document.createElement('img');
  newImg.style.display = 'none';
  wrap.appendChild(newImg);
  newImg.onload = newImg.onerror = function() {
    newImg.onload = newImg.onerror = null;
    newImg.style.display = '';
    if (oldImg) oldImg.remove();
  };
  newImg.src = newSrc;
}

// 淡出蜗牛，400ms 后归零进度；如有 _pendingSnailWalk 则再淡入
function snailHide() {
  if (_snailOutTimer) { clearTimeout(_snailOutTimer); _snailOutTimer = null; }
  if (_snailResetTimer) { clearTimeout(_snailResetTimer); _snailResetTimer = null; }
  const w = document.getElementById('snailWrap');
  if (w) w.style.opacity = '0';
  _snailResetTimer = setTimeout(() => {
    _snailResetTimer = null;
    setProgress(0);
    if (_pendingSnailWalk) {
      _pendingSnailWalk = false;
      setSnailSrc('img/snail.gif');
      const w2 = document.getElementById('snailWrap');
      if (w2) w2.style.opacity = '1';
    }
  }, 400);
}

function stopAudio() {
  stopProgressAnimation();
  _isPaused = false;
  _pendingSnailWalk = false;
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (playingCell) {
    cells[playingCell.r][playingCell.c].classList.remove('show-pause');
    playingCell = null;
  }
  document.getElementById('songNameBar').innerHTML = '';
  snailHide();
  if (_plOpen) renderPlaylist();
}

function pauseAudio() {
  if (!currentAudio || _isPaused) return;
  _isPaused = true;
  currentAudio.pause();
  stopProgressAnimation();
  if (playingCell) {
    cells[playingCell.r][playingCell.c].classList.remove('show-pause');
    cells[playingCell.r][playingCell.c].classList.add('show-play');
  }
  const pi = document.querySelector('#songNameBar .playing-icon');
  if (pi) pi.style.display = 'none';
  setSnailSrc('img/snail_in.gif');
}

function resumeAudio() {
  if (!currentAudio || !_isPaused) return;
  _isPaused = false;
  if (playingCell) {
    cells[playingCell.r][playingCell.c].classList.remove('show-play');
    cells[playingCell.r][playingCell.c].classList.add('show-pause');
  }
  const pi = document.querySelector('#songNameBar .playing-icon');
  if (pi) pi.style.display = '';
  currentAudio.play().catch(() => {});
  startProgressAnimation();
  setSnailSrc('img/snail_out.gif');
  _snailOutTimer = setTimeout(() => {
    _snailOutTimer = null;
    setSnailSrc('img/snail.gif');
  }, _snailOutDurationMs);
}

// 蜗牛拖拽（控制进度）+ 点击（暂停/继续）
function initSnailControls() {
  const wrap = document.getElementById('snailWrap');
  if (!wrap) return;
  let isDragging = false, didDrag = false, dragStartX = 0;

  wrap.addEventListener('pointerdown', (e) => {
    if (!currentAudio) return;
    e.stopPropagation(); e.preventDefault();
    isDragging = true; didDrag = false; dragStartX = e.clientX;
    wrap.setPointerCapture(e.pointerId);
  });

  wrap.addEventListener('pointermove', (e) => {
    if (!isDragging) return;
    if (!didDrag && Math.abs(e.clientX - dragStartX) > 4) {
      didDrag = true;
      stopProgressAnimation();
      // 已缩入状态（暂停中）拖拽不重复播缩入动画
      if (!_isPaused) setSnailSrc('img/snail_in.gif');
    }
    if (didDrag) {
      const rect = document.querySelector('.progress-bar-container').getBoundingClientRect();
      const pct = Math.max(0, Math.min(100, (e.clientX - rect.left) / rect.width * 100));
      setProgress(pct); // 仅更新视觉，pointerup 时再 seek，避免反复 seek 导致音频暂停
    }
  });

  wrap.addEventListener('pointerup', () => {
    if (!isDragging) return;
    isDragging = false;
    if (didDrag) {
      // 拖拽结束时一次性 seek
      if (currentAudio && currentAudio.duration) {
        const pct = parseFloat(document.getElementById('progressPlayed').style.width) || 0;
        currentAudio.currentTime = currentAudio.duration * pct / 100;
      }
      if (!_isPaused) {
        setSnailSrc('img/snail_out.gif');
        _snailOutTimer = setTimeout(() => { _snailOutTimer = null; setSnailSrc('img/snail.gif'); }, _snailOutDurationMs);
        startProgressAnimation();
      }
      // 暂停状态拖拽释放：保持缩入状态，等用户主动恢复
    }
  });

  wrap.addEventListener('click', (e) => {
    e.stopPropagation();
    if (didDrag) { didDrag = false; return; }
    if (!currentAudio) return;
    if (_isPaused) resumeAudio(); else pauseAudio();
  });
}

function clearSelection() {
  if (selectedCell) {
    cells[selectedCell.r][selectedCell.c].classList.remove('selected','show-play','show-pause');
    selectedCell = null;
  }
}

// ============ CELL CLICK ============
function onCellClick(r, c) {
  const k = keyRC(r, c);
  const data = cellData[k];
  const hasData = data && data.color;

  if (currentTool === 'edit') { if (hasData) openPopupA(r, c, true); return; }

  if (currentTool === 'delete') {
    if (hasData) {
      delete cellData[k];
      dbDelete(k);
      cells[r][c].style.background = '';
      cells[r][c].classList.remove('selected','show-play','show-pause');
    }
    return;
  }

  if (currentTool === 'move') {
    if (!moveSource) {
      if (hasData) { moveSource = {r,c}; cells[r][c].classList.add('selected'); }
    } else {
      const sk = keyRC(moveSource.r, moveSource.c);
      const srcData = cellData[sk] ? {...cellData[sk]} : null;
      const dstData = cellData[k] ? {...cellData[k]} : null;
      if (dstData) { cellData[sk] = dstData; dbPut(sk, dstData); }
      else { delete cellData[sk]; dbDelete(sk); }
      if (srcData) { cellData[k] = srcData; dbPut(k, srcData); }
      else { delete cellData[k]; dbDelete(k); }
      refreshCell(moveSource.r, moveSource.c);
      refreshCell(r, c);
      cells[moveSource.r][moveSource.c].classList.remove('selected');
      moveSource = null;
    }
    return;
  }

  if (currentTool === 'copy') {
    if (!copySource) {
      if (hasData) { copySource = {r,c}; cells[r][c].classList.add('selected'); }
    } else {
      if (!cellData[k] || !cellData[k].color) {
        const sk = keyRC(copySource.r, copySource.c);
        cellData[k] = {...cellData[sk]};
        dbPut(k, cellData[k]);
        refreshCell(r, c);
      }
      cells[copySource.r][copySource.c].classList.remove('selected');
      copySource = null;
    }
    return;
  }

  // No tool selected
  if (!hasData) { clearSelection(); stopAudio(); openPopupA(r, c, false); return; }

  if (selectedCell && selectedCell.r === r && selectedCell.c === c) {
    if (playingCell && playingCell.r === r && playingCell.c === c) {
      if (_isPaused) {
        resumeAudio();
      } else {
        pauseAudio();
      }
    } else {
      stopAudio();
      playCell(r, c);
    }
  } else {
    clearSelection(); stopAudio();
    selectedCell = {r,c};
    cells[r][c].classList.add('selected','show-play');
  }
}

function playCell(r, c) {
  const data = cellData[keyRC(r, c)];
  if (!data || !data.audioBase64) return;
  _isPaused = false;
  currentAudio = new Audio(data.audioBase64);
  currentAudio.loop = (_playMode === 'single');
  if (_playMode !== 'single') {
    currentAudio.addEventListener('ended', onAudioEnded);
  }
  currentAudio.play().catch(() => {});
  playingCell = {r,c};

  // track played_songs (distinct)
  const k = keyRC(r, c);
  const played = JSON.parse(localStorage.getItem('played_songs') || '[]');
  if (!played.includes(k)) { played.push(k); localStorage.setItem('played_songs', JSON.stringify(played)); }

  // track today_plays (every play, with color name)
  if (data.color) {
    const [rr, gg, bb] = hexToRgb(data.color);
    const [hh, ss, vv] = rgbToHsv(rr, gg, bb);
    const today = new Date().toISOString().slice(0, 10);
    let tp = JSON.parse(localStorage.getItem('today_plays') || '{"date":"","plays":[]}');
    if (tp.date !== today) tp = {date: today, plays: []};
    tp.plays.push(getColorName(hh, ss, vv));
    localStorage.setItem('today_plays', JSON.stringify(tp));
  }

  const el = cells[r][c];
  el.classList.remove('show-play');
  el.classList.add('show-pause');
  document.getElementById('songNameBar').innerHTML =
    '<img class="tone-icon" src="img/tone.png"><span class="song-text">' + (data.songName || '') + '</span><img class="playing-icon" src="img/playing.gif">';
  startProgressAnimation();
  if (_snailResetTimer) {
    _pendingSnailWalk = true;
  } else {
    setSnailSrc('img/snail.gif');
    const w = document.getElementById('snailWrap');
    if (w) w.style.opacity = '1';
  }
  if (_plOpen) renderPlaylist();
}

function refreshCell(r, c) {
  const d = cellData[keyRC(r, c)];
  const el = cells[r][c];
  el.classList.remove('selected','show-play','show-pause');
  el.style.background = (d && d.color) ? d.color : '';
}

function renderTagGrid(tags) {
  const grid = document.getElementById('tagGrid');
  grid.innerHTML = '';
  const SLOTS = 8;
  tags.forEach((tag, i) => {
    const btn = document.createElement('button');
    btn.className = 'tag-btn';
    btn.textContent = tag;
    btn.addEventListener('click', () => { tags.splice(i, 1); renderTagGrid(tags); });
    grid.appendChild(btn);
  });
  const empty = SLOTS - tags.length;
  for (let i = 0; i < empty; i++) {
    const btn = document.createElement('button');
    btn.className = 'tag-add-btn';
    btn.addEventListener('click', () => {
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'tag-input';
      inp.maxLength = 3;
      grid.replaceChild(inp, btn);
      inp.focus();
      function confirm() {
        inp.removeEventListener('blur', confirm);
        const val = inp.value.trim();
        if (val) tags.push(val);
        renderTagGrid(tags);
      }
      inp.addEventListener('blur', confirm);
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') { inp.removeEventListener('blur', confirm); const v = inp.value.trim(); if (v) tags.push(v); renderTagGrid(tags); } });
    });
    grid.appendChild(btn);
  }
}

function getColorName(h, s, v) {
  if (v <= 10)                  return '深沉的黑';
  if (v >= 92 && s <= 12)      return '温柔的白';
  if (s <= 12)                  return '忧郁的灰';
  let adj;
  if      (s <= 50 && v <= 70) adj = '忧郁的';
  else if (s <= 50 && v >  70) adj = '温柔的';
  else if (s >  50 && v <= 70) adj = '深沉的';
  else                          adj = '灿烂的';
  let hue;
  if      (h <= 15 || h >= 345) hue = '红';
  else if (h <= 40)              hue = '橙';
  else if (h <= 70)              hue = '黄';
  else if (h <= 160)             hue = '绿';
  else if (h <= 200)             hue = '青';
  else if (h <= 260)             hue = '蓝';
  else if (h <= 295)             hue = '紫';
  else                           hue = '粉';
  return adj + hue;
}

const _durationCache = {};
let _plOpen = false;
let _playMode = 'single';
const _playModes = ['single', 'list', 'random', 'seq'];
const _playModeIcons = {
  single: 'img/mode_single.png',
  list: 'img/mode_list.png',
  random: 'img/mode_random.png',
  seq: 'img/mode_seq.png'
};

function setPlayMode(mode) {
  _playMode = mode;
  document.getElementById('plModeIcon').src = _playModeIcons[mode];
  if (currentAudio) {
    currentAudio.loop = (mode === 'single');
  }
}

function onAudioEnded() {
  const prev = playingCell ? {r: playingCell.r, c: playingCell.c} : null;
  stopAudio();
  if (!prev) return;
  const tracks = getPlaylistTracks(document.getElementById('plSearch').value);
  if (tracks.length === 0) return;
  const idx = tracks.findIndex(t => t.r === prev.r && t.c === prev.c);
  if (_playMode === 'list') {
    const next = tracks[(idx + 1) % tracks.length];
    clearSelection(); playCell(next.r, next.c);
  } else if (_playMode === 'random') {
    const next = tracks[Math.floor(Math.random() * tracks.length)];
    clearSelection(); playCell(next.r, next.c);
  } else if (_playMode === 'seq') {
    if (idx < tracks.length - 1) {
      clearSelection(); playCell(tracks[idx + 1].r, tracks[idx + 1].c);
    }
  }
}

function formatDuration(s) {
  if (!s || isNaN(s) || !isFinite(s)) return '--:--';
  const m = Math.floor(s / 60);
  const ss = Math.floor(s % 60);
  return m + ':' + String(ss).padStart(2, '0');
}

function openPlaylist() {
  document.getElementById('playlistPanel').classList.add('open');
  document.getElementById('playlistOverlay').classList.add('open');
  _plOpen = true;
  renderPlaylist();
}

function closePlaylist() {
  document.getElementById('playlistPanel').classList.remove('open');
  document.getElementById('playlistOverlay').classList.remove('open');
  _plOpen = false;
}

function getPlaylistTracks(query) {
  const q = (query || '').trim().toLowerCase();
  const tracks = [];
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const k = keyRC(r, c);
      const d = cellData[k];
      if (!d || !d.audioBase64) continue;
      if (q) {
        const nameMatch = (d.songName || '').toLowerCase().includes(q);
        const tagMatch = (d.tags || []).some(t => t.toLowerCase().includes(q));
        let colorMatch = false;
        if (d.color) {
          const [rr, gg, bb] = hexToRgb(d.color);
          const [hh, ss, vv] = rgbToHsv(rr, gg, bb);
          colorMatch = getColorName(hh, ss, vv).includes(q);
        }
        if (!nameMatch && !tagMatch && !colorMatch) continue;
      }
      tracks.push({k, r, c, data: d});
    }
  }
  return tracks;
}

function renderPlaylist() {
  const wrap = document.getElementById('plListWrap');
  const query = document.getElementById('plSearch').value;
  const tracks = getPlaylistTracks(query);
  wrap.innerHTML = '';
  tracks.forEach(({k, r, c, data}) => {
    const item = document.createElement('div');
    item.className = 'pl-item';
    const isPlaying = playingCell && playingCell.r === r && playingCell.c === c;
    if (isPlaying) item.classList.add('pl-playing');

    const flower = document.createElement('div');
    flower.className = 'pl-flower';
    flower.style.setProperty('--flower-color', data.color || 'transparent');

    const nameEl = document.createElement('span');
    nameEl.className = 'pl-song-name';
    nameEl.textContent = data.songName || '（未命名）';

    const durEl = document.createElement('span');
    durEl.className = 'pl-duration';

    if (_durationCache[k] != null) {
      durEl.textContent = formatDuration(_durationCache[k]);
    } else if (isPlaying && currentAudio && isFinite(currentAudio.duration) && currentAudio.duration > 0) {
      _durationCache[k] = currentAudio.duration;
      durEl.textContent = formatDuration(currentAudio.duration);
    } else {
      durEl.textContent = '--:--';
      const a = new Audio();
      a.preload = 'metadata';
      a.addEventListener('loadedmetadata', () => {
        if (isFinite(a.duration) && a.duration > 0) {
          _durationCache[k] = a.duration;
          durEl.textContent = formatDuration(a.duration);
        }
        a.src = '';
      });
      a.src = data.audioBase64;
    }

    item.appendChild(flower);
    item.appendChild(nameEl);
    item.appendChild(durEl);

    item.addEventListener('click', () => {
      stopAudio();
      clearSelection();
      playCell(r, c);
    });

    wrap.appendChild(item);
  });
  requestAnimationFrame(() => {
    wrap.classList.toggle('pl-full', wrap.scrollHeight <= wrap.clientHeight);
  });
}

function getPotStage() {
  const played = JSON.parse(localStorage.getItem('played_songs') || '[]');
  if (played.length >= 10) return 3;
  if (played.length >= 1)  return 2;
  return 1;
}

function computeThemeColor(colorNames) {
  if (!colorNames || colorNames.length === 0) return null;
  const ADJ_SV = { '忧郁的': [31, 40], '温柔的': [31, 85], '深沉的': [75, 40], '灿烂的': [75, 85] };
  const HUE_H  = { '红': 7, '橙': 27, '黄': 55, '绿': 120, '青': 180, '蓝': 230, '紫': 277, '粉': 320 };
  const adjCount = {}, hueCount = {};
  colorNames.forEach(name => {
    const hue = name.slice(-1);
    if (HUE_H[hue] !== undefined) {
      const adj = name.slice(0, 3);
      if (ADJ_SV[adj]) adjCount[adj] = (adjCount[adj] || 0) + 1;
      hueCount[hue] = (hueCount[hue] || 0) + 1;
    }
  });
  const adjE = Object.entries(adjCount), hueE = Object.entries(hueCount);
  if (!adjE.length || !hueE.length) return hsvToHex(0, 0, 50);
  adjE.sort((a, b) => b[1] - a[1]); hueE.sort((a, b) => b[1] - a[1]);
  const [s, v] = ADJ_SV[adjE[0][0]];
  const h = HUE_H[hueE[0][0]];
  return hsvToHex(h, s, v);
}

function getMyThemeColor() {
  const names = [];
  for (const k in cellData) {
    const d = cellData[k];
    if (!d || !d.color) continue;
    const [rr, gg, bb] = hexToRgb(d.color);
    const [hh, ss, vv] = rgbToHsv(rr, gg, bb);
    names.push(getColorName(hh, ss, vv));
  }
  return computeThemeColor(names);
}

function getTodayThemeColor() {
  const today = new Date().toISOString().slice(0, 10);
  const tp = JSON.parse(localStorage.getItem('today_plays') || '{"date":"","plays":[]}');
  if (tp.date !== today || !tp.plays.length) return null;
  return computeThemeColor(tp.plays);
}

function triggerBloom() {
  _bloomed = true;
  const tc = getMyThemeColor() || '#888888';
  const potImg    = document.getElementById('potImg');
  const pistilDiv = document.getElementById('pistilDiv');
  potImg.src = 'img/pot_stage3_bloom.png';
  pistilDiv.style.backgroundColor = tc;
  pistilDiv.style.display = 'block'; pistilDiv.style.opacity = '1';
}

let _lastThemePanel = 'my';

function openThemeModal() {
  const todayColor = getTodayThemeColor();
  const myColor    = getMyThemeColor() || '#888888';
  const [mr, mg, mb] = hexToRgb(myColor);
  const [mh, ms, mv] = rgbToHsv(mr, mg, mb);
  document.getElementById('myThemeSwatch').style.backgroundColor = myColor;
  document.getElementById('myThemeName').textContent = getColorName(mh, ms, mv);
  document.getElementById('pistilDiv').style.backgroundColor = myColor;
  if (todayColor) {
    const [tr, tg, tb] = hexToRgb(todayColor);
    const [th, ts, tv] = rgbToHsv(tr, tg, tb);
    document.getElementById('todayThemeSwatch').style.backgroundColor = todayColor;
    document.getElementById('todayThemeName').textContent = getColorName(th, ts, tv);
  }
  const panel = (todayColor && _lastThemePanel === 'today') ? 'today' : 'my';
  _showThemePanel(panel, !!todayColor);
  document.getElementById('themeModal').classList.add('show');
}

function _showThemePanel(which, hasTodayColor) {
  _lastThemePanel = which;
  const isMy = which === 'my';
  document.getElementById('themePanelMy').style.display    = isMy ? '' : 'none';
  document.getElementById('themePanelToday').style.display = isMy ? 'none' : '';
  document.getElementById('themeArrowLeft').style.display  = isMy ? 'none' : '';
  document.getElementById('themeArrowRight').style.display = (!isMy || !hasTodayColor) ? 'none' : '';
  const pistilDiv = document.getElementById('pistilDiv');
  if (pistilDiv.style.display !== 'none') {
    const tc = isMy ? (getMyThemeColor() || '#888888') : (getTodayThemeColor() || getMyThemeColor() || '#888888');
    pistilDiv.style.backgroundColor = tc;
  }
}

function closeThemeModal() {
  document.getElementById('themeModal').classList.remove('show');
}

document.getElementById('themeModal').addEventListener('click', e => {
  if (e.target === document.getElementById('themeModal')) closeThemeModal();
});
document.getElementById('themePopup').addEventListener('click', e => e.stopPropagation());
document.getElementById('themeArrowLeft').addEventListener('click', e => {
  e.stopPropagation();
  _showThemePanel('my', !!getTodayThemeColor());
});
document.getElementById('themeArrowRight').addEventListener('click', e => {
  e.stopPropagation();
  _showThemePanel('today', true);
});

document.getElementById('potArea').addEventListener('click', () => {
  if (getPotStage() < 3) return;
  if (_bloomed) {
    openThemeModal();
  } else {
    triggerBloom();
  }
});

function showHomeScreen() {
  _bloomed = false;
  const stage = getPotStage();
  updatePotDisplay(stage);
  document.getElementById('cloudStrip').style.animationDuration = (window.innerWidth / 8) + 's';
  document.getElementById('homeScreen').classList.add('show');
}

function hideHomeScreen() {
  const el = document.getElementById('homeScreen');
  el.classList.add('fadeout');
  setTimeout(() => { el.classList.remove('show', 'fadeout'); }, 400);
}

document.getElementById('btnWorldGarden').addEventListener('click', () => { /* 暂不实装 */ });
document.getElementById('btnMyGarden').addEventListener('click', () => { hideHomeScreen(); });
document.getElementById('backBtn').addEventListener('click', () => { showHomeScreen(); });

// ============ GIF 时序常量（按实际 GIF 时长调整）============
const TITLE_GIF_DURATION_MS  = 2000;   // title.gif 单次播放时长（fallback）
const TITLE_REPLAY_PAUSE_MS  = 10000;  // 冻结后多久重播
const LOADING_GIF_DURATION_MS = 2500;  // loading.gif 单次播放时长（fallback）
const LOADING_GAP_MS          = 2000;  // loading 两次播放之间的间隔

// 解析 GIF 二进制得到实际总时长（ms），用于精确截取最后一帧
function parseGifDurationMs(ab) {
  try {
    const d = new Uint8Array(ab);
    let i = 13; // 跳过 6 字节 header + 7 字节 logical screen descriptor
    if (d[10] & 0x80) i += 3 * (2 << (d[10] & 7)); // global color table
    let ms = 0;
    while (i < d.length) {
      if (d[i] === 0x3B) break; // trailer
      if (d[i] === 0x21 && d[i+1] === 0xF9) { // graphic control extension
        ms += (d[i+4] | (d[i+5] << 8)) * 10; // delay 单位 centisec → ms
        i += 8;
      } else if (d[i] === 0x21) { // other extension
        i += 2;
        while (i < d.length && d[i]) i += d[i] + 1;
        i++;
      } else if (d[i] === 0x2C) { // image descriptor
        i += 9;
        const lp = d[i++];
        if (lp & 0x80) i += 3 * (2 << (lp & 7)); // local color table
        i++; // LZW min code size
        while (i < d.length && d[i]) i += d[i] + 1;
        i++;
      } else { i++; }
    }
    return ms;
  } catch(e) { return 0; }
}

let _titleGifDurationMs     = TITLE_GIF_DURATION_MS;
let _loadingGifDurationMs   = LOADING_GIF_DURATION_MS;
let _snailInDurationMs      = 500;
let _snailOutDurationMs     = 500;
let _uploadAnimDurationMs   = 1500;

// ============ 预加载资源列表 ============
const PRELOAD_IMAGES = [
  'img/btnbg.png','img/copy.png','img/delete.png','img/edit.png',
  'img/export.png','img/list.png','img/loading.gif','img/move.png',
  'img/pause.png','img/play.png','img/playing.gif',
  'img/snail.gif','img/snail_in.gif','img/snail_out.gif',
  'img/title.gif','img/tone.png',
  'img/popup_bg.png','img/song_input.png','img/tag.png','img/tag_add.png',
  'img/impression_color.png','img/chute.png','img/slider.png',
  'img/file_icon.png','img/color_label.png','img/confirm.png','img/confirm_color.png',
  'img/flower_icon.png','img/search_bar.png',
  'img/cover_placeholder.png',
  'img/mode_single.png','img/mode_list.png','img/mode_random.png','img/mode_seq.png',
  'img/home_bg.png','img/home_cloud.png','img/garden_warm.gif',
  'img/btn_world_garden.png','img/btn_my_garden.png',
  'img/pot_stage1.png','img/pot_stage2.png','img/pot_stage3.png',
  'img/pot_stage3_bloom.png','img/pistil.png',
  'img/arrow_left.png','img/arrow_right.png',
  'img/back.png'
];

// ============ 加载 GIF 循环（replaceWith，无空白帧）============
let _loadingActive = true;
let _deferHide = false;

function loopLoadingGif() {
  if (!_loadingActive) return;

  // 循环边界：完整播放完一遍后检查是否需要退出
  if (_deferHide) {
    _loadingActive = false;
    doHideLoadingScreen();
    return;
  }

  // gap 期间旧 gif 保持显示（停在最后一帧）
  setTimeout(() => {
    if (!_loadingActive) return;
    // gap 结束时再次检查，避免多播一遍
    if (_deferHide) {
      _loadingActive = false;
      doHideLoadingScreen();
      return;
    }
    const oldGif = document.getElementById('loadingGif');
    if (!oldGif) return;
    const newGif = document.createElement('img');
    newGif.id = 'loadingGif';
    newGif.style.display = 'none';
    oldGif.after(newGif); // 先入 DOM，确保移动端 onload 可靠触发
    newGif.onload = newGif.onerror = function() {
      newGif.onload = newGif.onerror = null;
      if (!_loadingActive) return;
      newGif.style.display = '';
      oldGif.remove();
      setTimeout(loopLoadingGif, _loadingGifDurationMs);
    };
    newGif.src = 'img/loading.gif';
  }, LOADING_GAP_MS);
}

// ============ 隐藏加载屏 ============
function doHideLoadingScreen() {
  const ls = document.getElementById('loadingScreen');
  const gif = document.getElementById('loadingGif');
  if (!ls) return;
  ls.style.transition = 'opacity 0.4s';
  ls.style.opacity = '0';
  if (gif) { gif.style.transition = 'opacity 0.4s'; gif.style.opacity = '0'; }
  if (_onHideStart) { _onHideStart(); _onHideStart = null; } // 淡出开始时触发回调
  setTimeout(() => { ls.remove(); if (gif) gif.remove(); }, 400);
}

let _onHideStart = null;
function hideLoadingScreen(cb) {
  _onHideStart = cb || null;
  _deferHide = true;
}

// ============ 标题 GIF：播一次 → 等 10s → 无闪烁重播 ============
let _titleIntervalId = null;

function restartTitleGif() {
  const img = document.getElementById('titleGif');
  if (!img) return;
  const url = freshGifSrc('img/title.gif');
  img.src = url !== null ? url : 'img/title.gif?t=' + Date.now();
}

function startTitleLoop() {
  restartTitleGif();
  if (_titleIntervalId) clearInterval(_titleIntervalId);
  _titleIntervalId = setInterval(restartTitleGif, TITLE_REPLAY_PAUSE_MS);
}

// tab 切回来时重置 interval，避免移动端定时器被节流后偏移
document.addEventListener('visibilitychange', function() {
  if (!document.hidden && _titleIntervalId !== null) {
    clearInterval(_titleIntervalId);
    restartTitleGif();
    _titleIntervalId = setInterval(restartTitleGif, TITLE_REPLAY_PAUSE_MS);
  }
});

// ============ 预加载所有媒体 ============
function preloadAll() {
  const fontP = new FontFace('Zpix', 'url(zpix.ttf)', { weight: 'normal', style: 'normal' })
    .load().then(f => document.fonts.add(f)).catch(() => {});
  const loadingDurP = fetch('img/loading.gif')
    .then(r => r.arrayBuffer())
    .then(ab => { const ms = parseGifDurationMs(ab); if (ms > 0) _loadingGifDurationMs = ms; })
    .catch(() => {});
  // GIFs that need blob-URL replay: cache bytes and parse durations
  const gifCacheEntries = [
    ['img/title.gif',       ab => { const ms = parseGifDurationMs(ab); if (ms > 0) _titleGifDurationMs = ms; }],
    ['img/snail.gif',       null],
    ['img/snail_in.gif',    ab => { const ms = parseGifDurationMs(ab); if (ms > 0) _snailInDurationMs = ms; }],
    ['img/snail_out.gif',   ab => { const ms = parseGifDurationMs(ab); if (ms > 0) _snailOutDurationMs = ms; }],
    ['img/upload_anim.gif', ab => { const ms = parseGifDurationMs(ab); if (ms > 0) _uploadAnimDurationMs = ms; }],
  ];
  const gifCacheP = Promise.all(gifCacheEntries.map(([url, handler]) =>
    fetch(url).then(r => r.arrayBuffer()).then(ab => { _gifBytes[url] = ab; if (handler) handler(ab); }).catch(() => {})
  ));
  const imgPs = PRELOAD_IMAGES.map(src => new Promise(res => {
    const i = new Image(); i.onload = i.onerror = res; i.src = src;
  }));
  return Promise.all([fontP, loadingDurP, gifCacheP, ...imgPs]);
}

// ============ INIT ============
// loading GIF 的 HTML src 让第一次播放自然开始，这里接管后续循环
setTimeout(loopLoadingGif, _loadingGifDurationMs);

Promise.all([
  openDB().then(() => dbGetAll()),
  preloadAll()
]).then(([data]) => {
  cellData = data;
  buildGrid();
  initToolbar();
  initSnailControls();
  hideLoadingScreen(() => { startTitleLoop(); showHomeScreen(); });
}).catch(err => {
  console.error('Init error', err);
  buildGrid();
  initToolbar();
  initSnailControls();
  hideLoadingScreen(() => { startTitleLoop(); showHomeScreen(); });
});

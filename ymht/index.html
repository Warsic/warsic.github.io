<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>一亩花田</title>
<style>
  /*
   * 基准单位 U = 100vw / 15（一个格子宽）
   * 所有布局尺寸均以 U 的倍数表达，无硬编码 px 尺寸
   * 仅保留装饰性 border-width (1-4px) 及 translate(1px,1px) 微交互
   */

  @font-face {
    font-family: 'Zpix';
    src: url('zpix.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  body {
    background-color: rgb(187, 183, 92);
    font-family: 'Zpix', 'Courier New', monospace;
    overflow-x: hidden;
    touch-action: manipulation;
    image-rendering: pixelated;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-bottom: calc(100vw / 20);
  }

  /* ── 右上角图标（无背景） ── */
  /* icon = 1.5U = calc(100vw/10)；间距 = icon/2 = calc(100vw/20) */
  .header-btns {
    position: fixed;
    right: calc(100vw / 20);
    top: calc(100vw / 20);
    display: flex;
    gap: calc(100vw / 20);
    align-items: center;
    z-index: 50;
  }

  .icon-btn {
    width: calc(100vw / 10);
    height: calc(100vw / 10);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
  }

  .icon-btn img {
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
  }

  /* ── 格子区（宽 = 13U = 13/15·vw） ── */
  .grid-area {
    width: calc(100vw * 13 / 15);
    display: flex;
    flex-direction: column;
  }

  .title-img {
    width: 100%;
    height: auto;
    display: block;
    image-rendering: pixelated;
  }

  /* ── 加载屏 ── */
  #loadingScreen {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: rgb(187, 183, 92);
  }

  #loadingGif {
    position: fixed;
    z-index: 10000;
    width: calc(100vw / 3);
    height: auto;
    image-rendering: pixelated;
    left: 50%;
    top: 40%;
    transform: translate(-50%, -50%);
  }

  /* 进度条高度 = U/8 = 100vw/120 */
  .progress-bar-container {
    width: 100%;
    height: calc(100vw / 120);
    background: rgb(106, 132, 77);
    position: relative;
    overflow: hidden;
  }

  .progress-bar-played {
    height: 100%;
    width: 0%;
    background: rgb(154, 163, 86);
  }

  .grid-wrap {
    width: 100%;
  }

  /* 分割线 = U/16；精确解：gap = grid_w/220 = 13/15/220·vw = 13/3300·vw */
  .grid-container {
    width: 100%;
    aspect-ratio: 1 / 1;
    display: grid;
    grid-template-columns: repeat(13, 1fr);
    grid-template-rows: repeat(13, 1fr);
    background: rgb(229, 225, 193);
    gap: calc(100vw * 13 / 3300);
  }

  .cell {
    background: rgb(242, 237, 204);
    position: relative;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* 选中描边向外扩展入分割线区，宽度 = gap */
  .cell.selected {
    outline: calc(100vw * 13 / 3300) solid rgb(187, 183, 92);
    z-index: 2;
  }

  .cell .play-icon,
  .cell .pause-icon {
    display: none;
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    image-rendering: pixelated;
  }

  .cell.show-play .play-icon { display: block; }
  .cell.show-pause .pause-icon { display: block; }

  /* ── 曲名（格子外侧下方）── */
  /* 固定高度保证工具栏位置不随曲名显隐变化；字体高度 = U/2 = 100vw/30 */
  .song-name-bar {
    width: 100%;
    height: calc(100vw / 22);
    display: flex;
    align-items: center;
    gap: calc(100vw / 90);
    font-size: calc(100vw / 30);
    color: rgb(127, 108, 76);
    overflow: hidden;
  }

  .song-name-bar .tone-icon {
    height: 1em;
    width: auto;
    flex-shrink: 0;
    image-rendering: pixelated;
  }

  .song-name-bar .song-text {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── 工具栏（等宽格子区：4btn + 3gap = 13U）── */
  /* btn = 23U/120；gap = U/2 = 100vw/30 */
  .toolbar {
    display: flex;
    gap: calc(100vw / 30);
    margin-top: calc(100vw / 20);
    width: calc(100vw * 13 / 15);
  }

  .tool-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
  }

  .tool-btn {
    width: 100%;
    aspect-ratio: 1 / 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    image-rendering: pixelated;
    position: relative;
    overflow: hidden;
    border: none;
    background: none;
  }

  .tool-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url('img/btnbg.png') center / cover no-repeat;
    opacity: 0.25;
    z-index: 0;
    image-rendering: pixelated;
  }

  .tool-btn.active::before {
    opacity: 1;
  }

  .tool-btn img {
    width: 60%;
    height: 60%;
    image-rendering: pixelated;
    position: relative;
    z-index: 1;
  }


  /* ── 弹窗 ── */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }

  .popup {
    background: #FFF8EE;
    border: 4px solid #5A3E28;
    padding: calc(100vw / 20);
    width: 85vw;
    position: relative;
  }

  .popup h3 {
    font-size: calc(100vw / 26);
    color: #5A3E28;
    margin-bottom: calc(100vw / 28);
    letter-spacing: 2px;
  }

  .popup label {
    font-size: calc(100vw / 32);
    color: #7A6A5A;
    display: block;
    margin-bottom: calc(100vw / 100);
    margin-top: calc(100vw / 39);
  }

  .popup input[type="text"] {
    width: 100%;
    padding: calc(100vw / 65) calc(100vw / 49);
    font-size: calc(100vw / 30);
    font-family: 'Zpix', 'Courier New', monospace;
    border: 2px solid #C8C0B0;
    background: #fff;
    outline: none;
    color: #333;
    user-select: text;
    -webkit-user-select: text;
  }

  .popup input[type="text"]:focus { border-color: #5A3E28; }

  .file-upload-area {
    margin-top: calc(100vw / 65);
    padding: calc(100vw / 39);
    border: 2px dashed #C8C0B0;
    text-align: center;
    font-size: calc(100vw / 35);
    color: #999;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .file-upload-area.has-file {
    border-color: #5A3E28;
    color: #5A3E28;
  }

  .file-upload-area input {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
  }

  .color-preview-row {
    display: flex;
    align-items: center;
    gap: calc(100vw / 49);
    margin-top: calc(100vw / 28);
  }

  .color-preview-row span {
    font-size: calc(100vw / 32);
    color: #7A6A5A;
  }

  .color-preview-cell {
    width: calc(100vw / 15);
    height: calc(100vw / 15);
    border: 2px solid #C8C0B0;
    cursor: pointer;
    background: #ccc;
  }

  .popup .confirm-btn {
    display: none;
    width: 100%;
    padding: calc(100vw / 39);
    margin-top: calc(100vw / 24);
    background: #5A3E28;
    color: #FFF8EE;
    border: none;
    font-size: calc(100vw / 28);
    font-family: 'Zpix', 'Courier New', monospace;
    cursor: pointer;
    letter-spacing: 4px;
  }
  .popup .confirm-btn.show { display: block; }
  .popup .confirm-btn:active { transform: translate(1px, 1px); }

  /* ── HSV 调色盘 ── */
  .hsv-popup {
    background: #FFF8EE;
    border: 4px solid #5A3E28;
    padding: calc(100vw / 22);
    width: 80vw;
  }

  .hsv-popup h3 {
    font-size: calc(100vw / 28);
    color: #5A3E28;
    margin-bottom: calc(100vw / 32);
    letter-spacing: 2px;
  }

  .hsv-row {
    display: flex;
    align-items: center;
    gap: calc(100vw / 49);
    margin-bottom: calc(100vw / 39);
  }

  .hsv-row label {
    width: calc(100vw / 20);
    font-size: calc(100vw / 30);
    color: #5A3E28;
    font-weight: bold;
    flex-shrink: 0;
  }

  .hsv-row input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    height: calc(100vw / 39);
    background: #E0D8CC;
    border: 2px solid #C8C0B0;
    outline: none;
  }

  .hsv-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: calc(100vw / 24);
    height: calc(100vw / 24);
    background: #5A3E28;
    border: 2px solid #FFF8EE;
    cursor: pointer;
  }

  .hsv-row .val {
    width: calc(100vw / 12);
    font-size: calc(100vw / 32);
    text-align: right;
    color: #5A3E28;
    flex-shrink: 0;
  }

  .hsv-preview {
    width: 100%;
    height: calc(100vw / 11);
    border: 2px solid #C8C0B0;
    margin-top: calc(100vw / 65);
    margin-bottom: calc(100vw / 32);
  }

  .hsv-ok-btn {
    width: 100%;
    padding: calc(100vw / 49);
    background: #5A3E28;
    color: #FFF8EE;
    border: none;
    font-size: calc(100vw / 30);
    font-family: 'Zpix', 'Courier New', monospace;
    cursor: pointer;
    letter-spacing: 4px;
  }

  .hsv-ok-btn:active { transform: translate(1px, 1px); }
</style>
</head>
<body>

<div id="loadingScreen">
  <img id="loadingGif" src="img/loading.gif" alt="">
</div>

<div class="header-btns">
  <button class="icon-btn" id="listBtn" title="播放列表">
    <img src="img/list.png">
  </button>
  <button class="icon-btn" id="exportBtn" title="导出PNG">
    <img src="img/export.png">
  </button>
</div>

<div class="grid-area">
  <img id="titleGif" class="title-img" alt="一亩花田">
  <div class="progress-bar-container">
    <div class="progress-bar-played" id="progressPlayed"></div>
  </div>
  <div class="grid-wrap">
    <div class="grid-container" id="grid"></div>
  </div>
  <div class="song-name-bar" id="songNameBar"></div>
</div>

<div class="toolbar" id="toolbar">
  <div class="tool-col">
    <div class="tool-btn" data-tool="edit" id="toolEdit"><img src="img/edit.png"></div>
  </div>
  <div class="tool-col">
    <div class="tool-btn" data-tool="move" id="toolMove"><img src="img/move.png"></div>
  </div>
  <div class="tool-col">
    <div class="tool-btn" data-tool="delete" id="toolDelete"><img src="img/delete.png"></div>
  </div>
  <div class="tool-col">
    <div class="tool-btn" data-tool="copy" id="toolCopy"><img src="img/copy.png"></div>
  </div>
</div>

<!-- Modal A: Edit cell -->
<div class="modal-overlay" id="modalA">
  <div class="popup" id="popupA">
    <h3>编辑花格</h3>
    <label>曲名</label>
    <input type="text" id="inputSongName" placeholder="输入曲名..." autocomplete="off">
    <label>音频文件</label>
    <div class="file-upload-area" id="fileUploadArea">
      <span id="fileLabel">点击选择音频文件</span>
      <input type="file" id="inputAudioFile" accept="audio/*">
    </div>
    <div class="color-preview-row">
      <span>颜色</span>
      <div class="color-preview-cell" id="colorPreviewCell"></div>
    </div>
    <div id="confirmBtnA" class="confirm-btn">确定</div>
  </div>
</div>

<!-- Modal B: HSV color picker -->
<div class="modal-overlay" id="modalB">
  <div class="hsv-popup" id="popupB">
    <h3>选择颜色</h3>
    <div class="hsv-row">
      <label>H</label>
      <input type="range" id="sliderH" min="0" max="360" value="180">
      <span class="val" id="valH">180</span>
    </div>
    <div class="hsv-row">
      <label>S</label>
      <input type="range" id="sliderS" min="0" max="100" value="50">
      <span class="val" id="valS">50</span>
    </div>
    <div class="hsv-row">
      <label>V</label>
      <input type="range" id="sliderV" min="0" max="100" value="50">
      <span class="val" id="valV">50</span>
    </div>
    <div class="hsv-preview" id="hsvPreview"></div>
    <button class="hsv-ok-btn" id="hsvOkBtn">确定</button>
  </div>
</div>

<script>
// ============ IndexedDB Storage ============
const DB_NAME = 'FlowerFieldDB';
const DB_VERSION = 1;
const STORE_NAME = 'cells';
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE_NAME)) {
        d.createObjectStore(STORE_NAME);
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e);
  });
}

function dbPut(key, value) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).put(value, key);
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e);
  });
}

function dbGet(key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = (e) => reject(e);
  });
}

function dbDelete(key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).delete(key);
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e);
  });
}

function dbGetAll() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const store = tx.objectStore(STORE_NAME);
    const result = {};
    const req = store.openCursor();
    req.onsuccess = (e) => {
      const cursor = e.target.result;
      if (cursor) {
        result[cursor.key] = cursor.value;
        cursor.continue();
      } else {
        resolve(result);
      }
    };
    req.onerror = (e) => reject(e);
  });
}

function dbClearAll() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).clear();
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e);
  });
}

// ============ DATA ============
const GRID_SIZE = 13;
let cells = [];
let cellData = {};
let currentTool = null;
let selectedCell = null;
let moveSource = null;
let copySource = null;
let currentAudio = null;
let playingCell = null;

let editingCell = null;
let tempColor = null;
let tempAudioBase64 = null;

function keyRC(r, c) { return r + ',' + c; }

// ============ HSV ============
function hsvToRgb(h, s, v) {
  s /= 100; v /= 100;
  const c = v * s;
  const x = c * (1 - Math.abs((h / 60) % 2 - 1));
  const m = v - c;
  let r1, g1, b1;
  if (h < 60) { r1=c; g1=x; b1=0; }
  else if (h < 120) { r1=x; g1=c; b1=0; }
  else if (h < 180) { r1=0; g1=c; b1=x; }
  else if (h < 240) { r1=0; g1=x; b1=c; }
  else if (h < 300) { r1=x; g1=0; b1=c; }
  else { r1=c; g1=0; b1=x; }
  return [Math.round((r1+m)*255), Math.round((g1+m)*255), Math.round((b1+m)*255)];
}

function rgbToHsv(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min;
  let h = 0, s = max === 0 ? 0 : d / max, v = max;
  if (d !== 0) {
    if (max === r) h = 60 * (((g-b)/d) % 6);
    else if (max === g) h = 60 * ((b-r)/d + 2);
    else h = 60 * ((r-g)/d + 4);
  }
  if (h < 0) h += 360;
  return [Math.round(h), Math.round(s*100), Math.round(v*100)];
}

function hsvToHex(h, s, v) {
  const [r, g, b] = hsvToRgb(h, s, v);
  return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
}

function hexToRgb(hex) {
  const m = hex.match(/^#?([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
  if (!m) return [200,200,200];
  return [parseInt(m[1],16), parseInt(m[2],16), parseInt(m[3],16)];
}

// ============ ICONS ============
function createPlaySvg() {
  return `<img src="img/play.png" class="play-icon">`;
}

function createPauseSvg() {
  return `<img src="img/pause.png" class="pause-icon">`;
}

// ============ GRID ============
function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  cells = [];
  for (let r = 0; r < GRID_SIZE; r++) {
    const row = [];
    for (let c = 0; c < GRID_SIZE; c++) {
      const el = document.createElement('div');
      el.className = 'cell';
      el.innerHTML = createPlaySvg() + createPauseSvg();
      el.addEventListener('click', () => onCellClick(r, c));
      grid.appendChild(el);
      row.push(el);
      const d = cellData[keyRC(r, c)];
      if (d && d.color) el.style.background = d.color;
    }
    cells.push(row);
  }
}

// ============ AUDIO ============
function setProgress(pct) {
  document.getElementById('progressPlayed').style.width = pct + '%';
}

function stopAudio() {
  if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; currentAudio = null; }
  if (playingCell) {
    cells[playingCell.r][playingCell.c].classList.remove('show-pause');
    playingCell = null;
  }
  document.getElementById('songNameBar').innerHTML = '';
  setProgress(0);
}

function clearSelection() {
  if (selectedCell) {
    cells[selectedCell.r][selectedCell.c].classList.remove('selected','show-play','show-pause');
    selectedCell = null;
  }
}

// ============ CELL CLICK ============
function onCellClick(r, c) {
  const k = keyRC(r, c);
  const data = cellData[k];
  const hasData = data && data.color;

  if (currentTool === 'edit') { if (hasData) openPopupA(r, c, true); return; }

  if (currentTool === 'delete') {
    if (hasData) {
      delete cellData[k];
      dbDelete(k);
      cells[r][c].style.background = '';
      cells[r][c].classList.remove('selected','show-play','show-pause');
    }
    return;
  }

  if (currentTool === 'move') {
    if (!moveSource) {
      if (hasData) { moveSource = {r,c}; cells[r][c].classList.add('selected'); }
    } else {
      const sk = keyRC(moveSource.r, moveSource.c);
      const srcData = cellData[sk] ? {...cellData[sk]} : null;
      const dstData = cellData[k] ? {...cellData[k]} : null;
      if (dstData) { cellData[sk] = dstData; dbPut(sk, dstData); }
      else { delete cellData[sk]; dbDelete(sk); }
      if (srcData) { cellData[k] = srcData; dbPut(k, srcData); }
      else { delete cellData[k]; dbDelete(k); }
      refreshCell(moveSource.r, moveSource.c);
      refreshCell(r, c);
      cells[moveSource.r][moveSource.c].classList.remove('selected');
      moveSource = null;
    }
    return;
  }

  if (currentTool === 'copy') {
    if (!copySource) {
      if (hasData) { copySource = {r,c}; cells[r][c].classList.add('selected'); }
    } else {
      if (!cellData[k] || !cellData[k].color) {
        const sk = keyRC(copySource.r, copySource.c);
        cellData[k] = {...cellData[sk]};
        dbPut(k, cellData[k]);
        refreshCell(r, c);
      }
      cells[copySource.r][copySource.c].classList.remove('selected');
      copySource = null;
    }
    return;
  }

  // No tool selected
  if (!hasData) { clearSelection(); stopAudio(); openPopupA(r, c, false); return; }

  if (selectedCell && selectedCell.r === r && selectedCell.c === c) {
    if (playingCell && playingCell.r === r && playingCell.c === c) {
      stopAudio();
      cells[r][c].classList.remove('show-pause');
      cells[r][c].classList.add('show-play');
    } else {
      stopAudio();
      playCell(r, c);
    }
  } else {
    clearSelection(); stopAudio();
    selectedCell = {r,c};
    cells[r][c].classList.add('selected','show-play');
  }
}

function playCell(r, c) {
  const data = cellData[keyRC(r, c)];
  if (!data || !data.audioBase64) return;
  currentAudio = new Audio(data.audioBase64);
  currentAudio.play().catch(() => {});
  playingCell = {r,c};
  const el = cells[r][c];
  el.classList.remove('show-play');
  el.classList.add('show-pause');
  document.getElementById('songNameBar').innerHTML =
    '<img class="tone-icon" src="img/tone.png"><span class="song-text">' + (data.songName || '') + '</span>';
  currentAudio.addEventListener('timeupdate', () => {
    if (currentAudio && currentAudio.duration) {
      setProgress((currentAudio.currentTime / currentAudio.duration) * 100);
    }
  });
  currentAudio.addEventListener('ended', () => {
    el.classList.remove('show-pause');
    el.classList.add('show-play');
    playingCell = null;
    currentAudio = null;
    document.getElementById('songNameBar').innerHTML = '';
    setProgress(0);
  });
}

function refreshCell(r, c) {
  const d = cellData[keyRC(r, c)];
  const el = cells[r][c];
  el.classList.remove('selected','show-play','show-pause');
  el.style.background = (d && d.color) ? d.color : '';
}

// ============ TOOLBAR ============
function initToolbar() {
  document.querySelectorAll('.tool-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tool = btn.dataset.tool;
      if (currentTool === tool) {
        btn.classList.remove('active');
        currentTool = null;
        moveSource = null; copySource = null;
        clearAllHighlights();
      } else {
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        currentTool = tool;
        btn.classList.add('active');
        moveSource = null; copySource = null;
        clearSelection(); stopAudio(); clearAllHighlights();
      }
    });
  });
}

function clearAllHighlights() {
  for (let r=0;r<GRID_SIZE;r++)
    for (let c=0;c<GRID_SIZE;c++)
      cells[r][c].classList.remove('selected','show-play','show-pause');
}

// ============ POPUP A ============
function openPopupA(r, c, isEdit) {
  editingCell = {r,c};
  const data = cellData[keyRC(r, c)];
  document.getElementById('inputSongName').value = (isEdit && data) ? (data.songName || '') : '';
  tempAudioBase64 = (isEdit && data) ? data.audioBase64 : null;
  tempColor = (isEdit && data && data.color) ? data.color : hsvToHex(180, 50, 50);

  const fl = document.getElementById('fileLabel');
  const area = document.getElementById('fileUploadArea');
  if (isEdit && data && data.audioBase64) {
    fl.textContent = '已有音频 (点击更换)';
    area.classList.add('has-file');
  } else {
    fl.textContent = '点击选择音频文件';
    area.classList.remove('has-file');
  }

  document.getElementById('colorPreviewCell').style.background = tempColor;
  document.getElementById('inputAudioFile').value = '';
  updateConfirmBtnA();
  cells[r][c].classList.add('selected');
  document.getElementById('modalA').classList.add('show');
}

function closePopupA() {
  document.getElementById('modalA').classList.remove('show');
  if (editingCell) {
    cells[editingCell.r][editingCell.c].classList.remove('selected');
    editingCell = null;
  }
}

function updateConfirmBtnA() {
  const name = document.getElementById('inputSongName').value.trim();
  const hasAudio = !!tempAudioBase64;
  const btn = document.getElementById('confirmBtnA');
  if (name && hasAudio && tempColor) btn.classList.add('show');
  else btn.classList.remove('show');
}

document.getElementById('inputSongName').addEventListener('input', updateConfirmBtnA);

document.getElementById('inputAudioFile').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    tempAudioBase64 = ev.target.result;
    document.getElementById('fileLabel').textContent = file.name;
    document.getElementById('fileUploadArea').classList.add('has-file');
    // 仅在曲名为空时按文件名预填（去掉扩展名）
    const nameInput = document.getElementById('inputSongName');
    if (!nameInput.value.trim()) {
      nameInput.value = file.name.replace(/\.[^.]+$/, '');
    }
    updateConfirmBtnA();
  };
  reader.readAsDataURL(file);
});

document.getElementById('colorPreviewCell').addEventListener('click', () => { openPopupB(); });

document.getElementById('confirmBtnA').addEventListener('click', function(e) {
  e.stopPropagation();
  if (!editingCell) return;
  const k = keyRC(editingCell.r, editingCell.c);
  const record = {
    color: tempColor,
    songName: document.getElementById('inputSongName').value.trim(),
    audioBase64: tempAudioBase64
  };
  cellData[k] = record;
  dbPut(k, record).then(() => {
    refreshCell(editingCell.r, editingCell.c);
    closePopupA();
  }).catch((err) => {
    console.error('Save failed', err);
    refreshCell(editingCell.r, editingCell.c);
    closePopupA();
  });
});

document.getElementById('popupA').addEventListener('click', function(e) { e.stopPropagation(); });
document.getElementById('modalA').addEventListener('click', function(e) {
  if (e.target === this) closePopupA();
});

// ============ POPUP B (HSV) ============
function openPopupB() {
  const [r, g, b] = hexToRgb(tempColor || hsvToHex(180,50,50));
  const [h, s, v] = rgbToHsv(r, g, b);
  document.getElementById('sliderH').value = h;
  document.getElementById('sliderS').value = s;

function closePopupB() { document.getElementById('modalB').classList.remove('show'); }

function updateHsvPreview() {

  document.getElementById('valH').textContent = h;

document.getElementById('sliderH').addEventListener('input', updateHsvPreview);
document.getElementById('sliderS').addEventListener('input', updateHsvPreview);
document.getElementById('sliderV').addEventListener('input', updateHsvPreview);

document.getElementById('hsvOkBtn').addEventListener('click', () => {
  const h = parseInt(document.getElementById('sliderH').value);
  const s = parseInt(document.getElementById('sliderS').value);
  const v = parseInt(document.getElementById('sliderV').value);
  tempColor = hsvToHex(h, s, v);

  updateConfirmBtnA();
});

document.getElementById('popupB').addEventListener('click', function(e) { e.stopPropagation(); });
document.getElementById('modalB').addEventListener('click', function(e) {

});

// ============ LIST (playlist placeholder) ============
document.getElementById('listBtn').addEventListener('click', () => {
  // playlist functionality not yet implemented
});

// ============ EXPORT PNG ============
document.getElementById('exportBtn').addEventListener('click', () => {
  const px = 80;
  const canvas = document.createElement('canvas');
  canvas.width = GRID_SIZE * px;
  canvas.height = GRID_SIZE * px;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const d = cellData[keyRC(r, c)];
      if (d && d.color) {
        ctx.fillStyle = d.color;
        ctx.fillRect(c * px, r * px, px, px);
      }
    }
  }
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '一亩花田.png';
    a.click();
    URL.revokeObjectURL(url);
  }, 'image/png');
});

// ============ GIF 时序常量（按实际 GIF 时长调整）============
const TITLE_GIF_DURATION_MS  = 2000;   // title.gif 单次播放时长（fallback）
const TITLE_REPLAY_PAUSE_MS  = 10000;  // 冻结后多久重播
const LOADING_GIF_DURATION_MS = 2500;  // loading.gif 单次播放时长（fallback）
const LOADING_GAP_MS          = 2000;  // loading 两次播放之间的间隔

// 解析 GIF 二进制得到实际总时长（ms），用于精确截取最后一帧
function parseGifDurationMs(ab) {
  try {
    const d = new Uint8Array(ab);
    let i = 13; // 跳过 6 字节 header + 7 字节 logical screen descriptor
    if (d[10] & 0x80) i += 3 * (2 << (d[10] & 7)); // global color table
    let ms = 0;
    while (i < d.length) {
      if (d[i] === 0x3B) break; // trailer
      if (d[i] === 0x21 && d[i+1] === 0xF9) { // graphic control extension
        ms += (d[i+4] | (d[i+5] << 8)) * 10; // delay 单位 centisec → ms
        i += 8;
      } else if (d[i] === 0x21) { // other extension
        i += 2;
        while (i < d.length && d[i]) i += d[i] + 1;
        i++;
      } else if (d[i] === 0x2C) { // image descriptor
        i += 9;
        const lp = d[i++];
        if (lp & 0x80) i += 3 * (2 << (lp & 7)); // local color table
        i++; // LZW min code size
        while (i < d.length && d[i]) i += d[i] + 1;
        i++;
      } else { i++; }
    }
    return ms;
  } catch(e) { return 0; }
}

let _titleGifDurationMs   = TITLE_GIF_DURATION_MS;
let _loadingGifDurationMs = LOADING_GIF_DURATION_MS;

// ============ 预加载资源列表 ============
const PRELOAD_IMAGES = [
  'img/btnbg.png','img/copy.png','img/delete.png','img/edit.png',
  'img/export.png','img/list.png','img/loading.gif','img/move.png',
  'img/pause.png','img/play.png','img/title.gif','img/tone.png'
];

// ============ 加载 GIF 循环（replaceWith，无空白帧）============
let _loadingActive = true;
let _deferHide = false;

function loopLoadingGif() {
  if (!_loadingActive) return;

  // 循环边界：完整播放完一遍后检查是否需要退出
  if (_deferHide) {
    _loadingActive = false;
    doHideLoadingScreen();
    return;
  }

  // gap 期间旧 gif 保持显示（停在最后一帧）
  setTimeout(() => {
    if (!_loadingActive) return;
    // gap 结束时再次检查，避免多播一遍
    if (_deferHide) {
      _loadingActive = false;
      doHideLoadingScreen();
      return;
    }
    const oldGif = document.getElementById('loadingGif');
    if (!oldGif) return;
    const newGif = document.createElement('img');
    newGif.id = 'loadingGif';
    newGif.style.display = 'none';
    oldGif.after(newGif); // 先入 DOM，确保移动端 onload 可靠触发
    newGif.onload = newGif.onerror = function() {
      newGif.onload = newGif.onerror = null;
      if (!_loadingActive) return;
      newGif.style.display = '';
      oldGif.remove();
      setTimeout(loopLoadingGif, _loadingGifDurationMs);
    };
    newGif.src = 'img/loading.gif';
  }, LOADING_GAP_MS);
}

// ============ 隐藏加载屏 ============
function doHideLoadingScreen() {
  const ls = document.getElementById('loadingScreen');
  const gif = document.getElementById('loadingGif');
  if (!ls) return;
  ls.style.transition = 'opacity 0.4s';
  ls.style.opacity = '0';
  if (gif) { gif.style.transition = 'opacity 0.4s'; gif.style.opacity = '0'; }
  if (_onHideStart) { _onHideStart(); _onHideStart = null; } // 淡出开始时触发回调
  setTimeout(() => { ls.remove(); if (gif) gif.remove(); }, 400);
}

let _onHideStart = null;
function hideLoadingScreen(cb) {
  _onHideStart = cb || null;
  _deferHide = true;
}

// ============ 标题 GIF：播一次 → 等 10s → 无闪烁重播 ============
let _titleIntervalId = null;

function restartTitleGif() {
  const img = document.getElementById('titleGif');
  if (!img) return;
  img.src = '';
  requestAnimationFrame(() => { img.src = 'img/title.gif'; });
}

function startTitleLoop() {
  restartTitleGif();
  if (_titleIntervalId) clearInterval(_titleIntervalId);
  _titleIntervalId = setInterval(restartTitleGif, TITLE_REPLAY_PAUSE_MS);
}

// tab 切回来时重置 interval，避免移动端定时器被节流后偏移
document.addEventListener('visibilitychange', function() {
  if (!document.hidden && _titleIntervalId !== null) {
    clearInterval(_titleIntervalId);
    restartTitleGif();
    _titleIntervalId = setInterval(restartTitleGif, TITLE_REPLAY_PAUSE_MS);
  }
});

// ============ 预加载所有媒体 ============
function preloadAll() {
  const fontP = new FontFace('Zpix', 'url(zpix.ttf)', { weight: 'normal', style: 'normal' })
    .load().then(f => document.fonts.add(f)).catch(() => {});
  const titleDurP = fetch('img/title.gif')
    .then(r => r.arrayBuffer())
    .then(ab => { const ms = parseGifDurationMs(ab); if (ms > 0) _titleGifDurationMs = ms; })
    .catch(() => {});
  const loadingDurP = fetch('img/loading.gif')
    .then(r => r.arrayBuffer())
    .then(ab => { const ms = parseGifDurationMs(ab); if (ms > 0) _loadingGifDurationMs = ms; })
    .catch(() => {});
  const imgPs = PRELOAD_IMAGES.map(src => new Promise(res => {
    const i = new Image(); i.onload = i.onerror = res; i.src = src;
  }));
  return Promise.all([fontP, titleDurP, loadingDurP, ...imgPs]);
}

// ============ INIT ============
// loading GIF 的 HTML src 让第一次播放自然开始，这里接管后续循环
setTimeout(loopLoadingGif, _loadingGifDurationMs);

Promise.all([
  openDB().then(() => dbGetAll()),
  preloadAll()
]).then(([data]) => {
  cellData = data;
  buildGrid();
  initToolbar();
  hideLoadingScreen(startTitleLoop);
}).catch(err => {
  console.error('Init error', err);
  buildGrid();
  initToolbar();
  hideLoadingScreen(startTitleLoop);
});
</script>
